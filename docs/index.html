<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal Snake — WebAssembly</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

    :root {
      --green:  #00ff41;
      --dim:    #00aa2a;
      --cyan:   #00f5ff;
      --purple: #b54cff;
      --dark:   #030a06;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    /* ── Animated grid background ─────────────────────────────── */
    body {
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
      position: relative;
    }

    /* Perspective grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,65,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,65,.06) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridScroll 8s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes gridScroll {
      from { background-position: 0 0;   }
      to   { background-position: 0 40px;}
    }

    /* Radial vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 40%, rgba(3,10,6,.95) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Title ────────────────────────────────────────────────── */
    .title-wrap {
      position: relative;
      z-index: 2;
      text-align: center;
    }
    h1 {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(1.2rem, 3vw, 2rem);
      letter-spacing: .25em;
      color: var(--green);
      text-shadow:
        0 0 8px  var(--green),
        0 0 20px var(--green),
        0 0 50px rgba(0,255,65,.4);
      animation: flicker 6s ease-in-out infinite;
    }
    @keyframes flicker {
      0%,100% { opacity:1; }
      92%     { opacity:1; }
      93%     { opacity:.4; }
      94%     { opacity:1; }
      96%     { opacity:.6; }
      97%     { opacity:1; }
    }

    /* Glitch data-text overlay */
    h1::before, h1::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0; right: 0;
      pointer-events: none;
      font-family: inherit;
      font-size: inherit;
      letter-spacing: inherit;
    }
    h1::before {
      color: var(--cyan);
      animation: glitch1 4s steps(2) infinite;
      clip-path: polygon(0 20%,100% 20%,100% 40%,0 40%);
      opacity: .6;
    }
    h1::after {
      color: var(--purple);
      animation: glitch2 4s steps(2) infinite;
      clip-path: polygon(0 60%,100% 60%,100% 80%,0 80%);
      opacity: .5;
    }
    @keyframes glitch1 {
      0%,90%,100% { transform: translate(0); }
      92%         { transform: translate(-3px, 1px); }
      95%         { transform: translate(3px,-1px); }
    }
    @keyframes glitch2 {
      0%,88%,100% { transform: translate(0); }
      90%         { transform: translate(4px, 0); }
      94%         { transform: translate(-2px,1px); }
    }

    .subtitle {
      margin-top: 4px;
      font-size: .7rem;
      letter-spacing: .2em;
      color: var(--dim);
    }

    /* ── Terminal container ───────────────────────────────────── */
    .terminal-outer {
      position: relative;
      z-index: 2;
      padding: 3px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--green), var(--cyan), var(--purple), var(--green));
      background-size: 300% 300%;
      animation: borderAnim 5s linear infinite;
      box-shadow:
        0 0 18px  rgba(0,255,65,.5),
        0 0 50px  rgba(0,255,65,.2),
        0 0 100px rgba(0,245,255,.1),
        inset 0 0 30px rgba(0,0,0,.8);
    }
    @keyframes borderAnim {
      0%   { background-position: 0% 50%;   }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%;   }
    }

    .terminal-inner {
      border-radius: 4px;
      overflow: hidden;
      background: #040d06;
      position: relative;
    }

    /* CRT scanlines overlay */
    .terminal-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,.18) 2px,
        rgba(0,0,0,.18) 4px
      );
      pointer-events: none;
      z-index: 10;
      border-radius: 4px;
    }

    /* CRT screen-glow inside */
    .terminal-inner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 30%,
        rgba(0,255,65,.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 11;
    }

    /* ── Corner decorations ───────────────────────────────────── */
    .corner {
      position: absolute;
      width: 14px; height: 14px;
      border-color: var(--cyan);
      border-style: solid;
      z-index: 3;
      opacity: .8;
    }
    .corner.tl { top:-1px;  left:-1px;  border-width:2px 0 0 2px; }
    .corner.tr { top:-1px;  right:-1px; border-width:2px 2px 0 0; }
    .corner.bl { bottom:-1px; left:-1px;  border-width:0 0 2px 2px; }
    .corner.br { bottom:-1px; right:-1px; border-width:0 2px 2px 0; }

    /* ── Controls footer ─────────────────────────────────────── */
    .controls {
      position: relative;
      z-index: 2;
      display: flex;
      gap: 28px;
      font-size: .68rem;
      color: #1a4a22;
    }
    .controls span { color: var(--dim); }
    .controls span b { color: var(--green); font-weight: normal; }

    /* ── Floating particles ───────────────────────────────────── */
    .particle {
      position: fixed;
      width: 2px; height: 2px;
      background: var(--green);
      border-radius: 50%;
      opacity: 0;
      animation: rise linear infinite;
      pointer-events: none;
      z-index: 1;
      box-shadow: 0 0 4px var(--green);
    }
    @keyframes rise {
      0%   { transform: translateY(0)   scaleX(1); opacity: .6; }
      100% { transform: translateY(-100vh) scaleX(1); opacity: 0;  }
    }
  </style>
</head>
<body>

  <!-- Floating particles (created by JS) -->

  <div class="title-wrap">
    <h1 data-text="TERMINAL SNAKE">TERMINAL SNAKE</h1>
    <div class="subtitle">WEBASSEMBLY &nbsp;/&nbsp; CUSTOM C LIBRARIES &nbsp;/&nbsp; OS PROJECT</div>
  </div>

  <div class="terminal-outer">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="terminal-inner">
      <div id="terminal"></div>
    </div>
  </div>

  <div class="controls">
    <span><b>WASD / ↑↓←→</b> Move</span>
    <span><b>P</b> Pause</span>
    <span><b>Q</b> Quit</span>
    <span><b>×8</b> Max Combo</span>
  </div>

  <script>
    /* ── Particles ─────────────────────────────────────────────── */
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left     = Math.random() * 100 + 'vw';
      p.style.bottom   = '-4px';
      p.style.animationDuration  = (6 + Math.random() * 14) + 's';
      p.style.animationDelay    = (Math.random() * 12) + 's';
      p.style.opacity  = (Math.random() * .5 + .1).toString();
      document.body.appendChild(p);
    }

    /* ── xterm.js ──────────────────────────────────────────────── */
    const term = new Terminal({
      cols: 80, rows: 34,
      fontSize: 14,
      fontFamily: '"Share Tech Mono", "Courier New", monospace',
      cursorBlink: false,
      allowProposedApi: true,
      theme: {
        background:    '#040d06',
        foreground:    '#b8ffcc',
        black:         '#040d06',
        brightBlack:   '#2a4a30',
        green:         '#00cc33', brightGreen:   '#00ff41',
        yellow:        '#cccc00', brightYellow:  '#ffff44',
        red:           '#cc2222', brightRed:     '#ff4444',
        cyan:          '#00cccc', brightCyan:    '#00f5ff',
        magenta:       '#8822cc', brightMagenta: '#b54cff',
        white:         '#88aa88', brightWhite:   '#ccffcc',
        cursor:        '#00ff41',
        selectionBackground: 'rgba(0,255,65,.2)',
      },
    });
    term.open(document.getElementById('terminal'));
    term.focus();

    /* ── Stdout bridge: screen_wasm.c EM_ASM → xterm Uint8Array ── */
    window.__termWrite = function(bytes) { term.write(bytes); };

    /* ── Keyboard → Wasm ───────────────────────────────────────── */
    term.onKey(function(e) {
      e.domEvent.preventDefault();
      if (typeof Module !== 'undefined' && Module._wasm_push_key)
        Module._wasm_push_key(e.domEvent.keyCode);
    });

    /* ── Emscripten Module ─────────────────────────────────────── */
    var Module = {};
  </script>

  <script src="snake.js"></script>
</body>
</html>
